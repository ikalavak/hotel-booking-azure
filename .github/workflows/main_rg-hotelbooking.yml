name: Build and deploy Node API to Azure Web App

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/main_rg-hotelbooking.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Build (optional)
        working-directory: backend
        run: npm run build --if-present

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: RG-HotelBooking
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend
